<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta property="og:title" content="Subway Time">
  <meta property="og:description" content="Real-time B, Q, S train arrivals">
  <meta property="og:image" content="https://subway-time.netlify.app/og-image.png">
  <meta property="og:url" content="https://subway-time.netlify.app/">
  <meta property="og:type" content="website">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="icon" type="image/svg+xml" href="mta-icon.svg">
  <link rel="icon" type="image/png" href="mta-icon.png">
  <link rel="apple-touch-icon" href="mta-icon.png">
  <title>Subway Time</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      background-color: #fafafa;
      padding: 2vh 2vw;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #cards-container {
      display: flex;
      flex-direction: column;
      gap: 2vh;
      width: 100%;
    }

    .card {
      width: 100%;
      height: 100%;
      background-color: #fff;
      border-radius: 2vw;
      padding: 3vh 3vw;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .title {
      font-size: 2vw;
      font-weight: 500;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.3vw;
      padding-bottom: 2vh;
      margin-bottom: 2vh;
      border-bottom: 1px solid #eee;
    }

    .row {
      display: none;
      align-items: center;
      flex-wrap: wrap;
      padding: 3vh 0;
      border-bottom: 2px solid #eee;
    }

    .row.visible:not(:has(~ .row.visible)) {
      border-bottom: none;
      padding-bottom: 0;
    }

    .row.visible {
      display: flex;
    }

    .alert-text {
      display: none;
      width: 100%;
      padding-top: 1.5vh;
      font-size: 1.4vw;
      color: #c00;
      line-height: 1.4;
      white-space: pre-line;
    }

    .alert-text.visible {
      display: block;
    }

    .direction {
      font-size: 2.5vw;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.2vw;
      width: 16vw;
      margin-right: 3vw;
      flex-shrink: 0;
    }

    .arrivals {
      display: flex;
      align-items: center;
      flex: 1;
    }

    .arrival {
      display: flex;
      align-items: center;
      gap: 1vw;
      width: 23vw;
    }

    .line-badge {
      width: 7vw;
      height: 7vw;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4vw;
      font-weight: bold;
      color: #fff;
      flex-shrink: 0;
      position: relative;
    }

    /* 1, 2, 3 - Red */
    .line-badge.\31 { background-color: #EE352E; }
    .line-badge.\32 { background-color: #EE352E; }
    .line-badge.\33 { background-color: #EE352E; }

    /* 4, 5, 6 - Green */
    .line-badge.\34 { background-color: #00933C; }
    .line-badge.\35 { background-color: #00933C; }
    .line-badge.\36 { background-color: #00933C; }

    /* 7 - Purple */
    .line-badge.\37 { background-color: #B933AD; }

    /* A, C, E - Blue */
    .line-badge.A { background-color: #0039A6; }
    .line-badge.C { background-color: #0039A6; }
    .line-badge.E { background-color: #0039A6; }

    /* B, D, F, M - Orange */
    .line-badge.B { background-color: #FF6319; }
    .line-badge.D { background-color: #FF6319; }
    .line-badge.F { background-color: #FF6319; }
    .line-badge.M { background-color: #FF6319; }

    /* G - Lime Green */
    .line-badge.G { background-color: #6CBE45; }

    /* J, Z - Brown */
    .line-badge.J { background-color: #996633; }
    .line-badge.Z { background-color: #996633; }

    /* L - Gray */
    .line-badge.L { background-color: #A7A9AC; }

    /* N, Q, R, W - Yellow */
    .line-badge.N { background-color: #FCCC0A; color: #000; }
    .line-badge.Q { background-color: #FCCC0A; color: #000; }
    .line-badge.R { background-color: #FCCC0A; color: #000; }
    .line-badge.W { background-color: #FCCC0A; color: #000; }

    /* S - Gray (Shuttles) */
    .line-badge.S { background-color: #808183; }

    /* SI - Blue (Staten Island Railway) */
    .line-badge.SI { background-color: #0039A6; }

    .line-badge.has-alert { cursor: pointer; }
    .line-badge.has-alert::after {
      content: '!';
      position: absolute;
      top: -0.4vw;
      right: -0.4vw;
      width: 2vw;
      height: 2vw;
      background: #c00;
      border-radius: 50%;
      font-size: 1.2vw;
      font-weight: bold;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0.25vw solid #fafafa;
    }

    .time {
      font-size: 8vw;
      font-weight: 600;
      color: #222;
    }

    #updated-global {
      position: absolute;
      top: 3vh;
      right: 3vw;
      font-size: 1.5vw;
      color: #bbb;
    }

    .station-divider {
      font-size: 1.8vw;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.25vw;
    }

    .station-section ~ .station-section .station-divider {
      background: #f0f0f0;
      margin: 2vh -3vw 0;
      padding: 1vh 3vw;
    }

    .no-trains {
      color: #aaa;
      font-size: 2.5vw;
      padding: 0.5vw 0;
    }

    .loading {
      text-align: center;
      padding: 10vh;
      color: #888;
      font-size: 3vw;
    }

    .error {
      text-align: center;
      padding: 5vh;
      color: #c00;
      font-size: 2vw;
    }

    /* Portrait mode for phones */
    @media (max-width: 500px) and (orientation: portrait) {
      body {
        padding: 3vh 4vw 12vh;
      }

      #cards-container {
        gap: 3vh;
      }

      .card {
        padding: 4vh 5vw;
      }

      .title {
        font-size: 5vw;
        letter-spacing: 0.5vw;
        padding-bottom: 2vh;
        margin-bottom: 3vh;
      }

      .row {
        flex-direction: column;
        align-items: flex-start;
        padding: 3vh 0;
      }

      .direction {
        font-size: 5vw;
        width: auto;
        margin-right: 0;
        margin-bottom: 2vh;
      }

      .arrivals {
        width: 100%;
        justify-content: flex-start;
      }

      .arrival {
        width: 27vw;
        gap: 2vw;
      }

      .line-badge {
        width: 10vw;
        height: 10vw;
        font-size: 6vw;
      }

      .line-badge.has-alert::after {
        top: -0.6vw;
        right: -0.6vw;
        width: 3vw;
        height: 3vw;
        font-size: 2vw;
        border-width: 0.4vw;
      }

      .alert-text {
        font-size: 3.5vw;
        padding-top: 2vh;
      }

      .time {
        font-size: 11vw;
      }

      #updated-global {
        top: 4vh;
        right: 5vw;
        font-size: 3.5vw;
      }

      .station-divider {
        font-size: 4vw;
        letter-spacing: 0.4vw;
      }

      .station-section ~ .station-section .station-divider {
        margin: 2vh -5vw 0;
        padding: 1.2vh 5vw;
      }

      .no-trains { font-size: 5vw; }

      .loading {
        font-size: 6vw;
      }

      .error {
        font-size: 5vw;
      }
    }
  </style>
</head>
<body>
  <div id="cards-container"></div>

  <script>
    function getStopBase(stopId) {
      if (!stopId) return null;
      const lastChar = stopId.slice(-1).toUpperCase();
      if (lastChar === 'N' || lastChar === 'S') return stopId.slice(0, -1);
      return stopId;
    }

    function parseStation(stationStr) {
      const [stationId, linesStr] = stationStr.split(':');
      const lines = linesStr ? linesStr.split(';').map(l => l.trim().toUpperCase()) : null;

      const lastChar = stationId.slice(-1).toUpperCase();
      let stopIds;
      if (lastChar === 'N') {
        stopIds = { NORTHBOUND: stationId.toUpperCase(), SOUTHBOUND: null };
      } else if (lastChar === 'S') {
        stopIds = { NORTHBOUND: null, SOUTHBOUND: stationId.toUpperCase() };
      } else {
        const base = stationId.toUpperCase();
        stopIds = { NORTHBOUND: base + 'N', SOUTHBOUND: base + 'S' };
      }

      const baseId = getStopBase(stopIds.NORTHBOUND || stopIds.SOUTHBOUND);
      return { stopIds, lines, baseId };
    }

    function parseStationParam() {
      const params = new URLSearchParams(window.location.search);
      const station = params.get('station');
      if (!station) return [parseStation('D26')];
      return station.split(',').map(s => parseStation(s.trim()));
    }

    const STATIONS = parseStationParam();
    const REFRESH_INTERVAL = 30000;
    let lastUpdate = null;

    function getAllStopIds() {
      const ids = [];
      for (const station of STATIONS) {
        const lineStr = station.lines?.length ? ':' + station.lines.join(';') : '';
        if (station.stopIds.NORTHBOUND) ids.push(station.stopIds.NORTHBOUND + lineStr);
        if (station.stopIds.SOUTHBOUND) ids.push(station.stopIds.SOUTHBOUND + lineStr);
      }
      return ids;
    }

    function stationRows(index) {
      return `
          <div class="row" id="row-${index}-manhattan">
            <div class="direction">Manhattan</div>
            <div class="arrivals" id="arrivals-${index}-manhattan"></div>
            <div class="alert-text" id="alert-${index}-manhattan"></div>
          </div>
          <div class="row" id="row-${index}-brooklyn">
            <div class="direction">Brooklyn</div>
            <div class="arrivals" id="arrivals-${index}-brooklyn"></div>
            <div class="alert-text" id="alert-${index}-brooklyn"></div>
          </div>
          <div class="row" id="row-${index}-franklin">
            <div class="direction">Franklin Ave</div>
            <div class="arrivals" id="arrivals-${index}-franklin"></div>
            <div class="alert-text" id="alert-${index}-franklin"></div>
          </div>
          <div class="row" id="row-${index}-prospect-park">
            <div class="direction">Prospect Park</div>
            <div class="arrivals" id="arrivals-${index}-prospect-park"></div>
            <div class="alert-text" id="alert-${index}-prospect-park"></div>
          </div>`;
    }

    function createStationCard(station, index) {
      const name = station.stationName || station.baseId;
      return `
        <div class="card" id="card-${index}">
          <div id="updated-global"></div>
          <h1 class="title" id="title-${index}">${name}</h1>
          <div class="content" id="content-${index}" style="display: none;">
            ${stationRows(index)}
          </div>
          <div id="loading-${index}" class="loading">Loading...</div>
        </div>`;
    }

    function createStationSection(station, index) {
      const name = station.stationName || station.baseId;
      return `
        <div class="station-section" id="card-${index}">
          <div class="station-divider" id="title-${index}">${name}</div>
          <div class="content" id="content-${index}" style="display: none;">
            ${stationRows(index)}
          </div>
          <div id="loading-${index}" class="loading">Loading...</div>
        </div>`;
    }

    function init() {
      const container = document.getElementById('cards-container');
      const builderLink = '<div style="text-align:center;padding-top:1vh;font-size:1.2vw;color:#ccc"><a href="/builder.html" style="color:inherit;text-decoration:underline;text-underline-offset:3px">build a url</a></div>';
      if (STATIONS.length === 1) {
        container.innerHTML = createStationCard(STATIONS[0], 0) + builderLink;
      } else {
        container.innerHTML = `<div class="card"><div id="updated-global"></div>${STATIONS.map((s, i) => createStationSection(s, i)).join('')}</div>` + builderLink;
      }

      async function maybeUpdate() {
        if (!lastUpdate || Date.now() - lastUpdate >= REFRESH_INTERVAL) {
          await updateDisplay();
        }
      }
      maybeUpdate();
      setInterval(() => {
        if (document.visibilityState === 'visible') maybeUpdate();
      }, REFRESH_INTERVAL);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') maybeUpdate();
      });
    }

    async function updateDisplay() {
      try {
        const stopIds = getAllStopIds();
        const response = await fetch(`/api/arrivals?stations=${stopIds.join(',')}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();

        // Resolve station names from API on first load
        if (data.stations) {
          let titleNeedsUpdate = false;
          STATIONS.forEach((station, index) => {
            const s = data.stations[station.baseId];
            if (s?.name && !station.stationName) {
              station.stationName = s.name;
              document.getElementById(`title-${index}`).textContent = s.name;
              titleNeedsUpdate = true;
            }
          });
          if (titleNeedsUpdate) {
            let pageTitle;
            if (STATIONS.length === 1) {
              pageTitle = STATIONS[0].stationName;
            } else {
              const lines = new Set();
              STATIONS.forEach(station => {
                const s = data.stations[station.baseId];
                const routes = (s?.routes || []);
                const filtered = station.lines?.length ? routes.filter(r => station.lines.includes(r)) : routes;
                filtered.forEach(r => lines.add(r));
              });
              pageTitle = lines.size > 0 ? [...lines].join(' ') : 'Subway Time';
            }
            if (pageTitle) {
              document.title = pageTitle;
              document.querySelector('meta[property="og:title"]').content = pageTitle + ' Subway';
            }
          }
        }

        lastUpdate = Date.now();
        STATIONS.forEach((station, index) => {
          updateStation(station, index, data.arrivals, data.alerts || {}, data.stations || {});
        });
      } catch (err) {
        console.error('Error fetching arrivals:', err);
      }
    }

    function updateStation(station, index, allArrivals, alerts, stations) {
      const { stopIds, lines } = station;
      const now = Math.floor(Date.now() / 1000);

      const allStationRoutes = stations[station.baseId]?.routes || [];
      const stationRoutes = lines ? allStationRoutes.filter(r => lines.includes(r)) : allStationRoutes;

      function toMinutes(arrivals) {
        return arrivals
          .map(a => ({ route: a.route, minutes: Math.floor((a.time - now) / 60) }))
          .filter(a => a.minutes >= 0 && a.minutes < 90);
      }

      const northArrivals = stopIds.NORTHBOUND ? toMinutes(allArrivals[stopIds.NORTHBOUND] || []) : [];
      const southArrivals = stopIds.SOUTHBOUND ? toMinutes(allArrivals[stopIds.SOUTHBOUND] || []) : [];

      const hasNonS = stationRoutes.some(r => r !== 'S');

      const manhattan = northArrivals
        .filter(a => a.route !== 'S')
        .sort((a, b) => a.minutes - b.minutes).slice(0, 3);
      const brooklyn = southArrivals
        .filter(a => a.route !== 'S')
        .sort((a, b) => a.minutes - b.minutes).slice(0, 3);
      const franklin = northArrivals
        .filter(a => a.route === 'S')
        .sort((a, b) => a.minutes - b.minutes).slice(0, 3);
      const prospectPark = southArrivals
        .filter(a => a.route === 'S')
        .sort((a, b) => a.minutes - b.minutes).slice(0, 3);

      renderStation(index, { manhattan, brooklyn, franklin, prospectPark }, alerts, {
        hasManhattan: !!stopIds.NORTHBOUND && hasNonS,
        hasBrooklyn: !!stopIds.SOUTHBOUND && hasNonS,
      });
    }

    function renderRow(rowId, arrivalsId, arrivals, alerts, hasStop) {
      const row = document.getElementById(rowId);
      const container = document.getElementById(arrivalsId);
      const alertEl = document.getElementById(arrivalsId.replace('arrivals-', 'alert-'));

      if (!hasStop) {
        row.classList.remove('visible');
        if (alertEl) alertEl.classList.remove('visible');
        return;
      }

      row.classList.add('visible');

      const arrivalHtml = (arrivals || []).map(a => {
        const hasAlert = !!alerts[a.route]?.length;
        return `
          <div class="arrival">
            <div class="line-badge ${a.route}${hasAlert ? ' has-alert' : ''}" data-route="${a.route}">${a.route}</div>
            <div class="time">${a.minutes}</div>
          </div>`;
      }).join('');

      const noTrainsHtml = !arrivals?.length ? '<div class="no-trains">No trains at this time</div>' : '';

      container.innerHTML = arrivalHtml + noTrainsHtml;

      if (alertEl) {
        const anyAlerts = arrivals?.some(a => alerts[a.route]?.length);
        if (anyAlerts) {
          container.querySelectorAll('.has-alert').forEach(badge => {
            badge.addEventListener('click', () => {
              const route = badge.dataset.route;
              const text = (alerts[route] || []).map(a => {
                const startStr = a.start
                  ? new Date(a.start * 1000).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
                  : null;
                return startStr ? `${a.text} (started ${startStr})` : a.text;
              }).map(s => `• ${s}`).join('\n');
              if (alertEl.classList.contains('visible') && alertEl.dataset.route === route) {
                alertEl.classList.remove('visible');
              } else {
                alertEl.textContent = text;
                alertEl.dataset.route = route;
                alertEl.classList.add('visible');
              }
            });
          });
        } else {
          alertEl.textContent = '';
          alertEl.classList.remove('visible');
        }
      }
    }

    function renderStation(index, data, alerts, { hasManhattan, hasBrooklyn } = {}) {
      document.getElementById(`loading-${index}`).style.display = 'none';
      document.getElementById(`content-${index}`).style.display = 'block';

      renderRow(`row-${index}-manhattan`, `arrivals-${index}-manhattan`, data.manhattan, alerts, hasManhattan);
      renderRow(`row-${index}-brooklyn`, `arrivals-${index}-brooklyn`, data.brooklyn, alerts, hasBrooklyn);
      renderRow(`row-${index}-franklin`, `arrivals-${index}-franklin`, data.franklin, alerts, data.franklin?.length > 0);
      renderRow(`row-${index}-prospect-park`, `arrivals-${index}-prospect-park`, data.prospectPark, alerts, data.prospectPark?.length > 0);

      document.getElementById('updated-global').textContent =
        `Updated ${new Date(lastUpdate).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;
    }

    init();
  </script>

  <script data-goatcounter="https://floracheng.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
